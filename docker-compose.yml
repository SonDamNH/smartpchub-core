version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: smartpchub_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: smartpchub_wp
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pchub_network

  wordpress:
    depends_on:
      - db
      - redis
    image: wordpress:6.4-php8.2-fpm-alpine
    container_name: smartpchub_wp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: smartpchub_wp
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      - wp_data:/var/www/html
    networks:
      - pchub_network

  webserver:
    depends_on:
      - wordpress
    image: nginx:alpine
    container_name: smartpchub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - wp_data:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pchub_network

  redis:
    image: redis:7-alpine
    container_name: smartpchub_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pchub_network

  typesense:
    image: typesense/typesense:26.0
    container_name: smartpchub_typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors=true'
    networks:
      - pchub_network

volumes:
  db_data:
  wp_data:
  redis_data:
  typesense_data:

networks:
  pchub_network:
    driver: bridge